<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  width="64"
  height="64"
>
  <defs>
    <linearGradient id="bg-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f8" />
      <stop offset="100%" stop-color="#dcdce8" />
    </linearGradient>
    <filter id="shadow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="1"
        stdDeviation="2"
        flood-color="#000022"
        flood-opacity="0.15"
      />
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect
    x="2"
    y="2"
    width="60"
    height="60"
    rx="14"
    ry="14"
    fill="url(#bg-light)"
    stroke="#b8b8cc"
    stroke-width="1.5"
    filter="url(#shadow-light)"
  />

  <!-- Power icon: arc (radius 14, centered at 32,33) -->
  <path
    d="M18 33 A 14 14 0 1 1 46 33"
    fill="none"
    stroke="#5050b0"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- Power icon: vertical bar (starts below arc top, ends below arc bottom) -->
  <line
    x1="32"
    y1="30"
    x2="32"
    y2="40"
    stroke="#5050b0"
    stroke-width="3.5"
    stroke-linecap="round"
  />
</svg>
